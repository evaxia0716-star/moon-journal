<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>月記</title>
<meta name="description" content="只屬於你的週期日誌。資料只存在你的手機裡。">
<meta name="theme-color" content="#F4ECEA">
<!-- iOS 安裝設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="月記">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F4ECEA; --card:#FAF4F2; --ink:#4D3F42; --ink-muted:#9C8B8E; --line:#E8D8D6;
  --rose:#C66E78; --rose-soft:#F4DEE0;
  --pistachio:#C99A9D; --pistachio-soft:#EDDCDC;
  --butter:#D9A079; --butter-soft:#F5E0D5;
  --lavender:#A37889; --lavender-soft:#E4D5DC;
  --num:'Jost','Avenir Next','Helvetica Neue',sans-serif;
  --tc:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
  --rose-text:#A3535A; --butter-text:#A07852; --pist-text:#925E66; --lav-text:#7E5763;
  --gold:#C6857C; --ring-track:#EAD9D8; --danger:#A4555B; --banner-text:#8C5C5F;
  --mem-grad:#F1E2E4; --nav-bg:rgba(255,255,255,.92);
}
html[data-theme="dark"]{
  --cream:#251D21; --card:#332A2F; --ink:#F1E4E7; --ink-muted:#AD969D; --line:#4A3C42;
  --rose:#D38B95; --rose-soft:#4D3239;
  --pistachio:#C98F96; --pistachio-soft:#46333A;
  --butter:#DCA478; --butter-soft:#493829;
  --lavender:#B287A0; --lavender-soft:#3F2F3B;
  --rose-text:#E8A8B0; --butter-text:#E2B488; --pist-text:#DFA6AE; --lav-text:#CFA0B8;
  --gold:#E0A287; --ring-track:#41343A; --danger:#E59AA0; --banner-text:#E8C9A0;
  --mem-grad:#3C2F37; --nav-bg:rgba(38,30,34,.92);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:pan-x pan-y}
html{-webkit-text-size-adjust:100%; height:100%; overscroll-behavior-y:none}
body{min-height:100%; overscroll-behavior-y:none}
button, nav, .chip, .exp-head, .cal-day, .ach{user-select:none; -webkit-user-select:none}
img{-webkit-user-drag:none}
body{
  font-family:var(--tc); background:var(--cream); color:var(--ink);
  font-size:clamp(14px, 3.6vw, 15.5px); line-height:1.7; letter-spacing:0.03em;
  line-break:strict; overflow-wrap:break-word;
  padding-bottom:calc(140px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}
header{
  display:flex; justify-content:space-between; align-items:center;
  padding:calc(18px + env(safe-area-inset-top)) 22px 10px;
}
.brand{display:flex; align-items:center; gap:11px}
.brand .logo{width:clamp(44px, 12vw, 56px); height:auto; flex:none;
  filter:drop-shadow(0 2px 8px rgba(166,90,100,.18))}
.brand-text{display:flex; flex-direction:column; gap:2px}
header h1{font-size:clamp(22px, 6vw, 26px); font-weight:600; letter-spacing:0.16em; line-height:1.2}
header .today-date{font-family:var(--num); font-size:14px; color:var(--ink-muted); letter-spacing:0.06em}
.streak-pill{
  display:inline-flex; align-items:center; gap:5px;
  background:var(--butter-soft); color:var(--butter-text);
  font-size:12px; padding:3px 11px; border-radius:99px; margin-left:8px;
}
main{padding:6px 18px 24px; max-width:480px; margin:0 auto}
@media (min-width:640px){ main{max-width:560px} }
.view{display:none}
.view.active{display:block; animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
@media (prefers-reduced-motion: reduce){
  *{animation:none!important; transition:none!important}
}

/* ── 環形週期圖 ─────────────────── */
.ring-wrap{position:relative; width:min(310px,84vw); margin:8px auto 4px}
.ring-wrap svg{width:100%; height:auto; display:block}
.ring-center{
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center; pointer-events:none;
}
.ring-center .cd-label{font-size:clamp(10px, 2.8vw, 11.5px); color:var(--ink-muted); letter-spacing:0.22em; text-transform:uppercase}
.ring-center .cd-num{font-family:var(--num); font-size:clamp(42px, 12vw, 52px); font-weight:300; line-height:1.1; letter-spacing:0.03em; color:var(--ink)}
.ring-center .phase-name{font-size:15px; font-weight:600; margin-top:2px}
.ring-center .phase-tip{font-size:clamp(11.5px, 3.2vw, 12.5px); color:var(--ink-muted); margin-top:4px; max-width:200px; line-height:1.55}
.dot-breathe{animation:breathe 2.8s ease-in-out infinite; transform-origin:center; transform-box:fill-box}
@keyframes breathe{0%,100%{opacity:.85; transform:scale(1)}50%{opacity:1; transform:scale(1.25)}}

/* 圖例 */
.legend{display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin:2px 0 16px}
.legend span{font-size:12px; color:var(--ink-muted); display:flex; align-items:center; gap:5px}
.legend i{width:9px; height:9px; border-radius:50%; display:inline-block}

/* ── 卡片與按鈕 ─────────────────── */
.card{
  background:var(--card); border-radius:20px; padding:18px 20px;
  box-shadow:0 2px 14px rgba(90,82,76,.06); margin-bottom:14px;
}
.card h3{font-size:clamp(13.5px, 3.6vw, 14.5px); font-weight:600; letter-spacing:0.08em; margin-bottom:8px; display:flex; align-items:center; gap:8px; white-space:nowrap}
.card h3 .h-dot{width:8px; height:8px; border-radius:50%}
.btn{
  display:block; width:100%; border:none; border-radius:16px;
  padding:14px; font-size:clamp(14px, 3.8vw, 15px); font-weight:600; font-family:var(--tc);
  letter-spacing:0.08em; white-space:nowrap; cursor:pointer; transition:transform .12s ease, filter .12s ease;
}
.btn:active{transform:scale(.985); filter:brightness(.97)}
.btn-rose{background:var(--rose); color:#fff}
.btn-soft{background:var(--rose-soft); color:var(--rose-text)}
.btn-ghost{background:transparent; color:var(--ink-muted); border:1.5px solid var(--line)}
.btn-row{display:flex; gap:10px}
.btn-row .btn{flex:1}
.next-period{display:flex; justify-content:space-between; align-items:baseline}
.next-period .np-date{font-family:var(--num); font-size:clamp(19px, 5vw, 22px); font-weight:400; letter-spacing:0.04em}
.next-period .np-in{font-size:13px; color:var(--ink-muted)}

/* 今日紀錄縮影 */
.today-tags{display:flex; flex-wrap:wrap; gap:7px; margin-top:6px}
.tag{
  font-size:12px; padding:4px 12px; border-radius:99px;
  background:var(--lavender-soft); color:var(--lav-text);
}
.tag.t-flow{background:var(--rose-soft); color:var(--rose-text)}
.tag.t-mood{background:var(--butter-soft); color:var(--butter-text)}
.tag.t-energy{background:var(--pistachio-soft); color:var(--pist-text)}
.empty-hint{font-size:13px; color:var(--ink-muted)}

/* ── 紀錄列表 ─────────────────── */
.rec-item{
  background:var(--card); border-radius:16px; padding:14px 16px;
  margin-bottom:10px; box-shadow:0 1px 8px rgba(90,82,76,.05);
}
.rec-item .rec-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px}
.rec-item .rec-date{font-family:var(--num); font-size:16px; font-weight:600}
.rec-item .rec-cd{font-size:11px; color:var(--ink-muted)}
.rec-item.rec-period{border-left:4px solid var(--rose)}
.rec-item .rec-note{font-size:13px; color:var(--ink); margin-top:6px; white-space:pre-wrap}

/* ── 洞察解鎖卡 ─────────────────── */
.unlock-card{position:relative; overflow:hidden}
.unlock-card.locked{opacity:.62}
.unlock-card .uc-req{font-size:12px; color:var(--ink-muted)}
.unlock-card .uc-body{font-size:14px; margin-top:6px}
.unlock-card .uc-big{font-family:var(--num); font-size:clamp(22px, 6vw, 26px); font-weight:400; margin:2px 0}
.lock-ico{position:absolute; top:16px; right:18px; font-size:15px; color:var(--ink-muted)}
.progress-track{height:7px; background:var(--line); border-radius:99px; margin-top:10px; overflow:hidden}
.progress-fill{height:100%; border-radius:99px; background:var(--lavender); transition:width .5s ease}
.badge-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:8px}
.badge{
  display:flex; flex-direction:column; align-items:center; gap:3px;
  width:68px; padding:10px 4px; border-radius:14px; background:var(--cream);
  font-size:11px; color:var(--ink-muted);
}
.badge.earned{background:var(--butter-soft); color:var(--butter-text); font-weight:600}
.badge .b-ico{font-size:20px; filter:grayscale(1); opacity:.45}
.badge.earned .b-ico{filter:none; opacity:1}
.energy-bars{display:flex; align-items:flex-end; gap:10px; height:74px; margin-top:10px}
.energy-bars .eb{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end}
.energy-bars .eb-bar{width:100%; border-radius:8px 8px 4px 4px; min-height:4px}
.energy-bars .eb-label{font-size:10px; color:var(--ink-muted)}

/* ── 設定 ─────────────────── */
.setting-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--line)}
.setting-row:last-child{border-bottom:none}
.setting-row label{font-size:14px}
.setting-row .sub{display:block; font-size:11px; color:var(--ink-muted)}
.stepper{display:flex; align-items:center; gap:12px}
.stepper button{
  width:32px; height:32px; border-radius:50%; border:none; font-size:18px;
  background:var(--rose-soft); color:var(--rose-text); cursor:pointer;
}
.stepper .st-val{font-family:var(--num); font-size:19px; font-weight:600; min-width:30px; text-align:center}
.danger{color:var(--danger)}

/* ── 底部分頁列 ─────────────────── */
nav{
  position:fixed; bottom:0; left:0; right:0;
  background:var(--nav-bg); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  display:flex; padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1; border:none; background:none; padding:10px 0 8px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:clamp(11px, 3vw, 12px); letter-spacing:0.1em; color:var(--ink-muted);
  font-family:var(--tc); cursor:pointer;
}
nav button.active{color:var(--rose-text); font-weight:600}
nav button svg{width:21px; height:21px}

/* ── 彈窗 ─────────────────── */
.modal-mask{
  position:fixed; inset:0; background:rgba(90,79,76,.35); z-index:50;
  display:none; align-items:flex-end; justify-content:center;
}
.modal-mask.open{display:flex}
.modal{
  background:var(--cream); width:calc(100% - 24px); max-width:460px;
  border-radius:22px; padding:18px 18px 16px;
  margin-bottom:calc(12px + env(safe-area-inset-bottom));
  max-height:78vh; overflow-y:auto; animation:slideUp .3s ease;
  box-shadow:0 8px 32px rgba(90,60,66,.18);
}
.modal .btn{padding:12px; font-size:14px}
@keyframes slideUp{from{transform:translateY(40px); opacity:0}to{transform:none; opacity:1}}
.modal h2{font-size:16px; font-weight:600; letter-spacing:0.08em; margin-bottom:10px}
.modal .field{margin-bottom:12px}
.modal .field > label{display:block; font-size:13px; font-weight:600; color:var(--ink-muted); margin-bottom:7px; letter-spacing:0.08em}
input[type=date], textarea{
  width:100%; border:1.5px solid var(--line); border-radius:12px;
  padding:10px 12px; font-size:16px; font-family:var(--tc);
  background:var(--card); color:var(--ink);
}
textarea{min-height:84px; resize:vertical}
input:focus, textarea:focus, .btn:focus-visible, nav button:focus-visible{outline:2px solid var(--lavender); outline-offset:2px}
.chips{display:flex; flex-wrap:wrap; gap:8px}
.chip{
  padding:7px 15px; border-radius:99px; font-size:13.5px; cursor:pointer;
  background:var(--card); border:1.5px solid var(--line); color:var(--ink);
  transition:all .12s ease; font-family:var(--tc);
}
.chip.on{background:var(--rose-soft); border-color:var(--rose); color:var(--rose-text); font-weight:600}
.chips.c-lav .chip.on{background:var(--lavender-soft); border-color:var(--lavender); color:var(--lav-text)}
.chips.c-but .chip.on{background:var(--butter-soft); border-color:var(--butter); color:var(--butter-text)}
.energy-dots{display:flex; gap:14px}
.energy-dots button{
  width:34px; height:34px; border-radius:50%; border:1.5px solid var(--line);
  background:var(--card); cursor:pointer; font-family:var(--num); font-size:15px; color:var(--ink-muted);
}
.energy-dots button.on{background:var(--pistachio); border-color:var(--pistachio); color:#fff; font-weight:600}
.start-list{margin-top:10px}
.start-list .sl-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 0; border-bottom:1px solid var(--line); font-size:13.5px;
}
.start-list .sl-del{border:none; background:none; color:var(--danger); font-size:13px; cursor:pointer; padding:4px 8px}

/* Toast */
#toast{
  position:fixed; left:50%; bottom:calc(90px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(16px);
  background:var(--ink); color:var(--cream); font-size:13.5px; letter-spacing:0.06em;
  padding:10px 22px; border-radius:99px; opacity:0; pointer-events:none;
  transition:all .3s ease; z-index:99; white-space:nowrap;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.section-hint{font-size:clamp(11.5px, 3.2vw, 12.5px); color:var(--ink-muted); text-align:center; margin:4px 0 14px; letter-spacing:0.04em}

/* ── v7：引導卡 ── */
.guide-steps div{display:flex; gap:10px; align-items:flex-start; font-size:13.5px; margin:9px 0; line-height:1.65}
.guide-steps b{flex:none; width:22px; height:22px; border-radius:50%; background:var(--rose-soft);
  color:var(--rose-text); display:flex; align-items:center; justify-content:center;
  font-family:var(--num); font-size:13px; font-weight:600; margin-top:1px}

/* ── v6：成就細節 ── */
.a-date{font-size:9px; color:var(--ink-muted); opacity:.8}
.ach.earned .a-date{color:#A07852}
.a-prog{display:block; width:80%; height:3px; background:var(--line); border-radius:99px; overflow:hidden; margin-top:2px}
.a-prog i{display:block; height:100%; background:var(--lavender); border-radius:99px}
.a-num{font-size:9px; color:var(--ink-muted)}

/* ── v6：私密鎖 ── */
#lockScreen{position:fixed; inset:0; background:var(--cream); z-index:300; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:16px;
  padding-bottom:env(safe-area-inset-bottom)}
.lock-logo{width:88px; height:auto}
.lock-title{font-size:15px; letter-spacing:.1em; color:var(--ink)}
.lock-dots{display:flex; gap:18px; height:14px}
.lock-dots i{width:13px; height:13px; border-radius:50%; border:1.5px solid var(--rose); display:inline-block}
.lock-dots i.f{background:var(--rose)}
.lock-pad{display:grid; grid-template-columns:repeat(3,72px); gap:14px; margin-top:8px}
.lock-pad button{width:72px; height:72px; border-radius:50%; border:none; background:var(--card);
  font-size:24px; font-family:var(--num); color:var(--ink); cursor:pointer;
  box-shadow:0 2px 10px rgba(166,90,100,.08)}
.lock-pad button:active{background:var(--rose-soft)}
.lock-forgot{border:none; background:none; color:var(--ink-muted); font-size:12.5px; margin-top:4px; font-family:var(--tc); cursor:pointer}
.lock-shake{animation:lshake .35s}
@keyframes lshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}

/* ── v5：行事曆 ── */
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:8px}
.cal-w{text-align:center; font-size:10.5px; color:var(--ink-muted); padding:2px 0}
.cal-day{aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-radius:10px; font-family:var(--num); font-size:clamp(11.5px,3vw,13px); color:var(--ink); gap:1px; position:relative}
.cal-moon{position:absolute; top:1px; right:2px; font-size:8px; line-height:1}
.cal-day.cd-period{background:var(--rose); color:#fff}
.cal-day.cd-period .cal-dot{background:#fff}
.cal-day.cd-pred{box-shadow:inset 0 0 0 1.5px var(--rose); color:var(--rose-text)}
.cal-day.cd-today{outline:2px solid var(--gold); outline-offset:-2px; font-weight:600}
.cal-dot{width:4px; height:4px; border-radius:50%; background:var(--lavender)}
.cal-legend{display:flex; gap:16px; justify-content:center; margin-top:10px; font-size:11px; color:var(--ink-muted)}
.cal-legend i{display:inline-block; width:9px; height:9px; border-radius:3px; margin-right:4px}
.li-p{background:var(--rose)} .li-e{box-shadow:inset 0 0 0 1.5px var(--rose)}
.li-d{background:var(--lavender); border-radius:50%; width:6px; height:6px; margin-bottom:1px}

/* ── v4：可展開卡片 ── */
.exp .exp-head{display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; -webkit-user-select:none; gap:10px}
.exp .exp-head h3{margin-bottom:0}
.exp .exp-right{display:flex; align-items:center; gap:8px; flex:none}
.exp .exp-status{font-size:clamp(11.5px,3.2vw,12.5px); color:var(--ink-muted); white-space:nowrap}
.exp .chev-i{display:inline-block; color:var(--ink-muted); font-size:11px; transition:transform .25s ease}
.exp.open .chev-i{transform:rotate(180deg)}
.exp .exp-body{display:none}
.exp.open .exp-body{display:block; margin-top:12px; animation:fadeUp .3s ease}

/* ── v3：月之籤 ── */
.qian-card{text-align:center; perspective:800px}
.qian-inner{position:relative; min-height:96px; transform-style:preserve-3d; transition:transform .7s cubic-bezier(.2,.7,.3,1)}
.qian-inner.flipped{transform:rotateY(180deg)}
.qian-face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px}
.qian-back{transform:rotateY(180deg)}
.qian-stick{font-size:30px}
.qian-text{font-size:clamp(13px, 3.6vw, 14.5px); line-height:1.85; color:var(--ink); max-width:100%; letter-spacing:0.01em}
.qian-phase{font-size:11px; color:var(--ink-muted); letter-spacing:0.2em}
.qian-btn{border:none; border-radius:99px; background:var(--lavender-soft); color:var(--lav-text);
  padding:10px 26px; font-size:clamp(13px, 3.6vw, 14px); font-weight:600; letter-spacing:0.06em; cursor:pointer; font-family:var(--tc); white-space:nowrap}

/* ── v3：解鎖紙花 ── */
.confetti{position:fixed; width:9px; height:13px; border-radius:3px; z-index:200; pointer-events:none;
  animation:confallin 1.5s ease-in forwards}
@keyframes confallin{
  0%{transform:translate(0,0) rotate(0); opacity:1}
  100%{transform:translate(var(--dx), 78vh) rotate(640deg); opacity:0}
}

/* ── v2：回憶卡 ── */
.memory-card{background:linear-gradient(135deg,var(--card),var(--mem-grad))}
.memory-when{font-size:12px; color:var(--lav-text); margin-top:2px}
.memory-quote{font-size:13.5px; color:var(--ink); margin-top:8px; white-space:pre-wrap; border-left:3px solid var(--lavender); padding-left:10px}

/* ── v2：備份提醒橫幅 ── */
.backup-banner{
  display:flex; justify-content:space-between; align-items:center; gap:10px;
  background:var(--butter-soft); border-radius:16px; padding:12px 16px;
  margin-bottom:12px; font-size:13px; color:var(--banner-text);
}
.backup-banner button{
  border:none; border-radius:99px; background:var(--butter); color:#fff;
  font-weight:600; padding:7px 16px; font-size:13px; cursor:pointer;
  font-family:var(--tc); white-space:nowrap;
}

/* ── v2：月報卡 ── */
.month-nav{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
.month-nav button{border:none; background:var(--cream); width:30px; height:30px; border-radius:50%; cursor:pointer; color:var(--ink); font-size:13px}
.month-nav .mn-title{font-family:var(--num); font-size:clamp(15.5px, 4.4vw, 17px); font-weight:500; letter-spacing:0.06em}
.month-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:6px}
.month-stats .ms{background:var(--cream); border-radius:12px; padding:8px 6px; text-align:center}
.month-stats .ms b{font-family:var(--num); font-size:clamp(17px, 4.6vw, 20px); font-weight:400; display:block}

.wall-head{display:flex; justify-content:space-between; align-items:baseline}
.wall-count{font-size:12px; color:var(--ink-muted)}
.wall-tier{font-size:clamp(11.5px, 3.2vw, 12.5px); color:var(--ink-muted); letter-spacing:0.12em; margin:12px 0 6px}
.wall-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px}
.ach{
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:10px 4px; border-radius:14px; background:var(--cream);
  font-size:clamp(11px, 3vw, 12px); color:var(--ink-muted); text-align:center; line-height:1.4;
}
.ach.earned{background:var(--butter-soft); color:var(--butter-text); font-weight:600}
.ach .a-ico{font-size:19px; filter:grayscale(1); opacity:.4}
.ach.earned .a-ico{filter:none; opacity:1}
.ach.hidden-egg .a-ico{filter:none; opacity:.5}

<body>

<script>
'use strict';
/* ═══════════════ 資料層 ═══════════════ */
const KEY = 'moonJournal.v1';
const FLOWS = ['無','少','中','多'];
const SYMPTOMS = ['腹痛','頭痛','腰痠','脹氣','乳房脹痛','疲倦','長痘','失眠','食慾增加'];
const MOODS = ['平靜','開心','煩躁','低落','焦慮','敏感'];
const BADGES = [
  {days:3,  ico:'🌱', name:'萌芽 3 天'},
  {days:7,  ico:'🌙', name:'滿週 7 天'},
  {days:14, ico:'🌿', name:'半月 14 天'},
  {days:21, ico:'🌸', name:'習慣 21 天'},
  {days:66, ico:'🌕', name:'恆星 66 天'},
  {days:100,ico:'🌟', name:'恆心 100 天'},
  {days:180,ico:'☀️', name:'半年 180 天'},
  {days:365,ico:'🌌', name:'一年的我'},
];

const DEF = () => ({
  starts:[], entries:{},
  settings:{cycleLen:28, periodLen:5, birthday:null, theme:'light', pin:null},
  maxStreak:0, achievements:{}, lastBackupCount:0, lastBackupDate:null, nightOwl:false,
  qian:null, qianCount:0, hasImported:false, dawnBird:false, exportCount:0
});
let state = load();
let persistGranted = null;   // 永久儲存狀態（稍後由系統回覆）
const openState = { month:true, wall:false, u0:false, u1:false, u2:false, u3:false };
document.addEventListener('click', (e)=>{
  const head = e.target.closest('.exp-head');
  if(!head) return;
  const card = head.closest('.exp');
  const k = card.dataset.k;
  openState[k] = !openState[k];
  card.classList.toggle('open', openState[k]);
});
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){
      const s = JSON.parse(raw);
      const out = Object.assign(DEF(), s);
      out.settings = Object.assign(DEF().settings, s.settings||{});
      return out;
    }
  }catch(e){}
  return DEF();
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

/* ═══════════════ 日期工具 ═══════════════ */
function todayStr(){ const d=new Date(); return fmt(d); }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parse(s){ const [y,m,dd]=s.split('-').map(Number); return new Date(y,m-1,dd); }
function diffDays(a,b){ return Math.round((parse(b)-parse(a))/86400000); }
function addDays(s,n){ const d=parse(s); d.setDate(d.getDate()+n); return fmt(d); }
function niceDate(s){ const d=parse(s); return (d.getMonth()+1)+' 月 '+d.getDate()+' 日'; }
function weekday(s){ return ['日','一','二','三','四','五','六'][parse(s).getDay()]; }

/* ═══════════════ 週期計算 ═══════════════ */
function sortedStarts(){ return [...state.starts].sort(); }
function avgCycle(){
  const st = sortedStarts();
  if(st.length < 2) return state.settings.cycleLen;
  const diffs = [];
  for(let i=Math.max(1,st.length-6); i<st.length; i++) diffs.push(diffDays(st[i-1], st[i]));
  const valid = diffs.filter(d=>d>=15 && d<=60);
  if(!valid.length) return state.settings.cycleLen;
  return Math.round(valid.reduce((a,b)=>a+b,0)/valid.length);
}
function cycleInfo(dateStr){
  const st = sortedStarts().filter(s=>s<=dateStr);
  if(!st.length) return null;
  const last = st[st.length-1];
  const day = diffDays(last, dateStr) + 1;
  const len = avgCycle();
  return {day, len, lastStart:last};
}
function phaseOf(day, len, periodLen){
  const ovu = Math.max(periodLen+2, len-14);          // 排卵中心日
  if(day <= periodLen) return {key:'menstrual', name:'經期', color:'var(--rose)', tip:'好好休息，對自己溫柔一點'};
  if(day >= ovu-1 && day <= ovu+1) return {key:'ovulation', name:'排卵期', color:'var(--butter)', tip:'精力高峰，適合重要的事'};
  if(day < ovu) return {key:'follicular', name:'濾泡期', color:'var(--pistachio)', tip:'能量回升，適合啟動新計畫'};
  return {key:'luteal', name:'黃體期', color:'var(--lavender)', tip:'放慢步調，多給自己緩衝'};
}

/* ═══════════════ 成就系統 ═══════════════ */
function moonAge(d){ // 月齡：0 = 新月，約 14.77 = 滿月
  const ref = Date.UTC(2000, 0, 6, 18, 14);   // 已知新月時刻
  const days = (d.getTime() - ref) / 86400000;
  return ((days % 29.530588) + 29.530588) % 29.530588;
}
function isFullMoon(d){ const a = moonAge(d); return a >= 13.9 && a <= 15.7; }
function isNewMoon(d){ const a = moonAge(d); return a <= 1.0 || a >= 28.53; }
function moonEmoji(d){
  const a = moonAge(d);
  if(a < 1.0 || a >= 28.53) return ['🌑','新月'];
  if(a < 6.4)  return ['🌒','眉月'];
  if(a < 8.4)  return ['🌓','上弦月'];
  if(a < 13.9) return ['🌔','盈凸月'];
  if(a < 15.7) return ['🌕','滿月'];
  if(a < 21.1) return ['🌖','虧凸月'];
  if(a < 23.1) return ['🌗','下弦月'];
  return ['🌘','殘月'];
}

function drawQian(){
  if(state.qian && state.qian.date === todayStr()) return;   // 一天一籤
  const ci = cycleInfo(todayStr());
  let key = 'any';
  if(ci && ci.day <= ci.len) key = phaseOf(ci.day, ci.len, state.settings.periodLen).key;
  const pool = QIAN[key].concat(QIAN.any);
  state.qian = { date: todayStr(), key, text: pool[Math.floor(Math.random()*pool.length)] };
  state.qianCount = (state.qianCount||0) + 1;
  save();
  document.getElementById('qianInner').classList.add('flipped');
  setTimeout(()=>{ checkAchievements(); renderInsights(); }, 750);
}

/* ═══════════════ 環形圖 ═══════════════ */
function drawRing(){
  const svg = document.getElementById('ringSvg');
  const center = document.getElementById('ringCenter');
  const cx=160, cy=160, r=126, sw=24;
  const C = 2*Math.PI*r;
  const info = cycleInfo(todayStr());
  let html = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--ring-track)" stroke-width="${sw}"/>`;

  if(!info){
    svg.innerHTML = html;
    center.innerHTML = `<div class="cd-label">Moon Journal</div>
      <div class="cd-num" style="font-size:34px">○</div>
      <div class="phase-tip">等待第一筆紀錄<br>點「紀錄經期開始」開始妳的月記</div>`;
    return;
  }
  const len = info.len, pl = Math.min(state.settings.periodLen, len-4);
  const ovu = Math.max(pl+2, len-14);
  // 四段弧長（天數）：經期 / 濾泡 / 排卵(3天) / 黃體
  const segs = [
    {days:pl, color:'var(--rose)'},
    {days:Math.max(0, ovu-pl-2), color:'var(--pistachio)'},
    {days:3, color:'var(--butter)'},
    {days:len-(ovu+1), color:'var(--lavender)'},
  ];
  const gap = C*0.012;
  let offset = 0;
  segs.forEach(s=>{
    if(s.days<=0) return;
    const arc = (s.days/len)*C - gap;
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}"
      stroke-width="${sw}" stroke-linecap="round"
      stroke-dasharray="${Math.max(arc,2)} ${C}"
      stroke-dashoffset="${-offset}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += (s.days/len)*C;
  });
  // 今天的金點（呼吸）
  const dayClamped = Math.min(info.day, len);
  const ang = ((dayClamped-0.5)/len)*2*Math.PI - Math.PI/2;
  const dx = cx + r*Math.cos(ang), dy = cy + r*Math.sin(ang);
  html += `<g class="dot-breathe"><circle cx="${dx}" cy="${dy}" r="11" fill="var(--card)"/><circle cx="${dx}" cy="${dy}" r="7.5" fill="var(--gold)"/></g>`;
  svg.innerHTML = html;

  const ph = phaseOf(info.day, len, pl);
  const over = info.day > len;
  center.innerHTML = `<div class="cd-label">Cycle Day</div>
    <div class="cd-num">${info.day}</div>
    <div class="phase-name" style="color:${over?'var(--ink-muted)':ph.color.replace('var(--rose)','var(--rose-text)').replace('var(--pistachio)','var(--pist-text)').replace('var(--butter)','var(--butter-text)').replace('var(--lavender)','var(--lav-text)')}">${over?'週期已超過預估':ph.name}</div>
    <div class="phase-tip">${over?'若經期已來，記得按「紀錄經期開始」':ph.tip}</div>`;
}

function renderMemory(){

  let hit=null, label='';
  for(let i=1;i<=5;i++){
    const d=(y-i)+'-'+md;
    if(state.entries[d]){ hit=d; label=(i===1?'去年':i+' 年前')+'的今天'; break; }

  if(!hit){ const d=addDays(t,-30); if(state.entries[d]){ hit=d; label='30 天前的你'; } }
  if(!hit){ card.style.display='none'; return; }
  const e=state.entries[hit];

  if(e.mood) bits.push(e.mood);
  if(e.energy) bits.push('精力 '+'●'.repeat(e.energy));
  (e.symptoms||[]).slice(0,3).forEach(s=>bits.push(s));
  card.innerHTML = `<h3><span class="h-dot" style="background:var(--lavender)"></span>回憶 · ${label}</h3>

    ${e.note?`<div class="memory-quote">${esc(e.note)}</div>`:''}`;

function renderCalendar(){
  const y = calMonth.getFullYear(), m = calMonth.getMonth();
  const startDow = new Date(y, m, 1).getDay();
  const dim = new Date(y, m+1, 0).getDate();
  const t = todayStr();
  // 實際經期日（每次開始日往後推經期長度）
  const pset = new Set();
  sortedStarts().forEach(s=>{ for(let i=0;i<state.settings.periodLen;i++) pset.add(addDays(s,i)); });
  // 預估下次經期日
  const eset = new Set();
  const st = sortedStarts();
  if(st.length){
    const nx = addDays(st[st.length-1], avgCycle());
    for(let i=0;i<state.settings.periodLen;i++) eset.add(addDays(nx,i));
  }
  let cells = '';
  ['日','一','二','三','四','五','六'].forEach(w=>cells+=`<div class="cal-w">${w}</div>`);
  for(let i=0;i<startDow;i++) cells += '<div></div>';
  for(let d=1; d<=dim; d++){
    const ds = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cls = ['cal-day'];
    if(pset.has(ds)) cls.push('cd-period');
    else if(eset.has(ds)) cls.push('cd-pred');
    if(ds===t) cls.push('cd-today');
    const dot = state.entries[ds] ? '<span class="cal-dot"></span>' : '<span class="cal-dot" style="opacity:0"></span>';
    const dObj = parse(ds);
    const moon = isFullMoon(dObj) ? '🌕' : (isNewMoon(dObj) ? '🌑' : '');
    cells += `<div class="${cls.join(' ')}">${moon?`<span class="cal-moon">${moon}</span>`:''}${d}${dot}</div>`;
  }
  document.getElementById('calCard').innerHTML = `
    <div class="month-nav">
      <button id="cPrev" aria-label="上一月">◀</button>
      <span class="mn-title">${y} 年 ${m+1} 月</span>
      <button id="cNext" aria-label="下一月">▶</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">
      <span><i class="li-p"></i>經期</span>
      <span><i class="li-e"></i>預估</span>
      <span><i class="li-d"></i>有紀錄</span>
    </div>`;
  document.getElementById('cPrev').addEventListener('click', ()=>{ calMonth.setMonth(calMonth.getMonth()-1); renderCalendar(); });
  document.getElementById('cNext').addEventListener('click', ()=>{ calMonth.setMonth(calMonth.getMonth()+1); renderCalendar(); });
}

/* ═══════════════ 連續紀錄與徽章 ═══════════════ */
function currentStreak(){
  let n=0, d=todayStr();
  if(!state.entries[d]) d=addDays(d,-1);          // 今天還沒寫，從昨天往回算
  while(state.entries[d]){ n++; d=addDays(d,-1); }
  return n;
}
function renderStreakPill(){
  const s = currentStreak();
  const pill = document.getElementById('streakPill');
  if(s>=2){ pill.style.display='inline-flex'; pill.textContent='🔥 連續 '+s+' 天'; }
  else pill.style.display='none';
}

/* ═══════════════ 洞察 ═══════════════ */
function lutealSymptomTop(){
  const counts={};
  Object.keys(state.entries).forEach(d=>{
    const ci=cycleInfo(d); if(!ci) return;
    const ph=phaseOf(ci.day, ci.len, state.settings.periodLen);
    if(ph.key==='luteal') (state.entries[d].symptoms||[]).forEach(s=>counts[s]=(counts[s]||0)+1);
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3);
}
function energyByPhase(){
  const sum={menstrual:[0,0],follicular:[0,0],ovulation:[0,0],luteal:[0,0]};
  Object.keys(state.entries).forEach(d=>{
    const e=state.entries[d]; if(!e.energy) return;
    const ci=cycleInfo(d); if(!ci) return;
    const ph=phaseOf(ci.day, ci.len, state.settings.periodLen);
    sum[ph.key][0]+=e.energy; sum[ph.key][1]++;
  });
  const out={};
  Object.keys(sum).forEach(k=> out[k]= sum[k][1]? sum[k][0]/sum[k][1] : 0 );
  return out;
}
function renderInsights(){
  // 連續紀錄卡 + 徽章
  const s = currentStreak();
  if(s > (state.maxStreak||0)){ state.maxStreak=s; save(); }
  const next = BADGES.find(b=>b.days>(state.maxStreak||0));
  document.getElementById('streakCard').innerHTML = `
    <h3><span class="h-dot" style="background:var(--butter)"></span>連續紀錄</h3>
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <span class="uc-big">${s} <span style="font-size:14px;font-family:var(--tc)">天</span></span>
      <span class="empty-hint">最長紀錄 ${state.maxStreak||0} 天</span>
    </div>
    ${next?`<div class="progress-track"><div class="progress-fill" style="width:${Math.min(100,(s/next.days)*100)}%;background:var(--butter)"></div></div>
    <div class="empty-hint" style="margin-top:6px">再 ${next.days-s>0?next.days-s:0} 天解鎖「${next.name}」</div>`:''}`;
  renderMonth();
  renderWall();

  // 解鎖卡
  const n = sortedStarts().length;
  const unlocks = [
    {need:1, title:'基本預測', dot:'var(--rose)', body:()=> {
      return `平均週期 <span class="uc-big">${avgCycle()}</span> 天<br>下次經期預估：${niceDate(addDays(sortedStarts().slice(-1)[0], avgCycle()))}`;
    }},
    {need:3, title:'我的 PMS 模式', dot:'var(--lavender)', body:()=>{
      const top = lutealSymptomTop();
      if(!top.length) return '黃體期還沒有症狀紀錄——下個黃體期記得勾選症狀，模式就會浮現。';
      return '你的黃體期最常出現：'+top.map(t=>`<span class="tag">${t[0]} ×${t[1]}</span>`).join(' ')+'<br><span class="empty-hint">知道它會來，就不會被它嚇到。</span>';
    }},
    {need:6, title:'精力高峰圖', dot:'var(--pistachio)', body:()=>{
      const e = energyByPhase();
      const names={menstrual:'經期',follicular:'濾泡',ovulation:'排卵',luteal:'黃體'};
      const colors={menstrual:'var(--rose)',follicular:'var(--pistachio)',ovulation:'var(--butter)',luteal:'var(--lavender)'};
      const max=Math.max(...Object.values(e),1);
      let best='', bv=0; Object.keys(e).forEach(k=>{if(e[k]>bv){bv=e[k];best=k;}});
      return `<div class="energy-bars">${Object.keys(e).map(k=>`
        <div class="eb"><div class="eb-bar" style="height:${(e[k]/max)*100}%;background:${colors[k]}"></div>
        <span class="eb-label">${names[k]}</span></div>`).join('')}</div>
        ${bv?`<div class="empty-hint" style="margin-top:8px">你的精力高峰在「${names[best]}期」——重要的事排在這裡。</div>`:''}`;
    }},
    {need:12, title:'年度週期報告', dot:'var(--butter)', body:()=>{
      const st=sortedStarts(); const diffs=[];
      for(let i=1;i<st.length;i++) diffs.push(diffDays(st[i-1],st[i]));
      const v=diffs.filter(d=>d>=15&&d<=60);
      return `這一年你記下了 <b>${st.length}</b> 次週期、<b>${Object.keys(state.entries).length}</b> 篇日記。<br>
        週期最短 ${Math.min(...v)} 天、最長 ${Math.max(...v)} 天、平均 ${avgCycle()} 天。<br>
        <span class="empty-hint">一年份的自己，都在這裡了。</span>`;
    }},
  ];
  document.getElementById('unlockList').innerHTML = unlocks.map((u, i)=>{
    const ok = n>=u.need;
    return `<div class="card unlock-card exp ${ok?'':'locked'} ${openState['u'+i]?'open':''}" data-k="u${i}">
      <div class="exp-head">
        <h3><span class="h-dot" style="background:${u.dot}"></span>${u.title}</h3>
        <span class="exp-right"><span class="exp-status">${ok?'已解鎖 ✓':'🔒 '+n+' / '+u.need}</span><span class="chev-i">▾</span></span>
      </div>
      <div class="exp-body">
        <div class="uc-req">紀錄 ${u.need} 個週期解鎖</div>
        ${ok?`<div class="uc-body">${u.body()}</div>`
            :`<div class="progress-track"><div class="progress-fill" style="width:${(n/u.need)*100}%"></div></div>`}
      </div>
    </div>`;
  }).join('');
}

/* ═══════════════ 月報卡 ═══════════════ */
let reportMonth = new Date(); reportMonth.setDate(1);
function monthStats(y, m){
  const prefix = y+'-'+String(m+1).padStart(2,'0');
  const dim = new Date(y, m+1, 0).getDate();
  const dates = Object.keys(state.entries).filter(d=>d.startsWith(prefix));
  const moods={}, syms={}; let eSum=0, eN=0;
  const series = Array(dim).fill(null);
  dates.forEach(d=>{
    const e=state.entries[d];
    if(e.mood) moods[e.mood]=(moods[e.mood]||0)+1;
    (e.symptoms||[]).forEach(s=>syms[s]=(syms[s]||0)+1);
    if(e.energy){ eSum+=e.energy; eN++; series[Number(d.slice(8))-1]=e.energy; }
  });
  const top = o=>{ const a=Object.entries(o).sort((x,b)=>b[1]-x[1]); return a.length?a[0][0]:'—'; };
  return {
    days: dates.length, eSum, eN, dim, series,
    pStarts: state.starts.filter(d=>d.startsWith(prefix)).length,
    topMood: top(moods), topSym: top(syms),
  };
}
function renderMonth(){
  const y = reportMonth.getFullYear(), m = reportMonth.getMonth();
  const s = monthStats(y, m);
  const pts = [];
  s.series.forEach((v,i)=>{ if(v!=null) pts.push([ (i/Math.max(s.dim-1,1))*260+10, 50-((v-1)/4)*40 ]); });
  let spark = '';
  if(pts.length>=2){
    spark = '<svg viewBox="0 0 280 60" width="100%" height="60" style="margin-top:10px">'
      + '<polyline fill="none" stroke="var(--pistachio)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="'
      + pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ') + '"/>'
      + pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="var(--pistachio)"/>`).join('')
      + '</svg><div class="empty-hint" style="text-align:center">本月精力曲線</div>';
  }
  const mc = document.getElementById('monthCard');
  mc.className = 'card exp' + (openState.month ? ' open' : '');
  mc.dataset.k = 'month';
  mc.innerHTML = `
    <div class="exp-head">
      <h3><span class="h-dot" style="background:var(--pistachio)"></span>本月報告</h3>
      <span class="exp-right"><span class="exp-status">${y} 年 ${m+1} 月 · ${s.days} 筆</span><span class="chev-i">▾</span></span>
    </div>
    <div class="exp-body">
    <div class="month-nav">
      <button id="mPrev" aria-label="上一月">◀</button>
      <span class="mn-title">${y} 年 ${m+1} 月</span>
      <button id="mNext" aria-label="下一月">▶</button>
    </div>
    <div class="month-stats">
      <div class="ms"><b>${s.days}</b><span>紀錄天數</span></div>
      <div class="ms"><b>${s.eN?(s.eSum/s.eN).toFixed(1):'—'}</b><span>平均精力</span></div>
      <div class="ms"><b>${s.pStarts}</b><span>經期開始</span></div>
    </div>
    <div class="month-stats" style="grid-template-columns:repeat(2,1fr)">
      <div class="ms"><b style="font-size:15px;font-family:var(--tc)">${s.topMood}</b><span>最常心情</span></div>
      <div class="ms"><b style="font-size:15px;font-family:var(--tc)">${s.topSym}</b><span>最常症狀</span></div>
    </div>
    ${spark}
    <button class="btn btn-soft" id="btnShareMonth" style="margin-top:14px">分享月報卡</button>
    </div>`;
  document.getElementById('mPrev').addEventListener('click', ()=>{ reportMonth.setMonth(reportMonth.getMonth()-1); renderMonth(); });
  document.getElementById('mNext').addEventListener('click', ()=>{ reportMonth.setMonth(reportMonth.getMonth()+1); renderMonth(); });
  document.getElementById('btnShareMonth').addEventListener('click', shareMonthCard);
}

/* ═══════════════ 月報分享卡（Canvas 生成圖片）═══════════════ */
function rr(x, a, b, w, h, r){
  x.beginPath();
  x.moveTo(a+r, b);
  x.arcTo(a+w, b, a+w, b+h, r); x.arcTo(a+w, b+h, a, b+h, r);
  x.arcTo(a, b+h, a, b, r);     x.arcTo(a, b, a+w, b, r);
  x.closePath();
}
async function shareMonthCard(){
  const y = reportMonth.getFullYear(), m = reportMonth.getMonth();
  const s = monthStats(y, m);
  const W = 1080, H = 1350;
  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const x = cv.getContext('2d');
  const TC = '"PingFang TC","Noto Sans TC",sans-serif';
  // 底與卡片
  x.fillStyle = '#F4ECEA'; x.fillRect(0, 0, W, H);
  x.fillStyle = '#FAF4F2'; rr(x, 60, 60, W-120, H-120, 48); x.fill();
  // LOGO
  try{
    const img = new Image(); img.src = 'logo-header.png';
    await img.decode();
    x.drawImage(img, W/2-95, 115, 190, 190);
  }catch(e){}
  x.textAlign = 'center';
  // 標題
  x.fillStyle = '#4D3F42'; x.font = '600 58px '+TC;
  x.fillText('月記 · '+y+' 年 '+(m+1)+' 月', W/2, 400);
  // 三大數字
  [[s.days,'紀錄天數'], [s.eN?(s.eSum/s.eN).toFixed(1):'—','平均精力'], [s.pStarts,'經期開始']].forEach((cd, i)=>{
    const cx = W/2 + (i-1)*290;
    x.fillStyle = '#C66E78'; x.font = '300 100px "Jost","Avenir Next",sans-serif';
    x.fillText(String(cd[0]), cx, 580);
    x.fillStyle = '#9C8B8E'; x.font = '30px '+TC;
    x.fillText(cd[1], cx, 632);
  });
  // 心情／症狀
  x.fillStyle = '#4D3F42'; x.font = '36px '+TC;
  x.fillText('最常心情：'+s.topMood+'　　最常症狀：'+s.topSym, W/2, 740);
  // 精力曲線
  const pts = [];
  s.series.forEach((v,i)=>{ if(v!=null) pts.push([150+(i/Math.max(s.dim-1,1))*780, 1010-((v-1)/4)*170]); });
  if(pts.length>=2){
    x.strokeStyle = '#C99A9D'; x.lineWidth = 7; x.lineJoin = 'round'; x.lineCap = 'round';
    x.beginPath(); pts.forEach((p,i)=> i ? x.lineTo(p[0],p[1]) : x.moveTo(p[0],p[1])); x.stroke();
    x.fillStyle = '#C99A9D';
    pts.forEach(p=>{ x.beginPath(); x.arc(p[0], p[1], 10, 0, 7); x.fill(); });
    x.fillStyle = '#9C8B8E'; x.font = '28px '+TC;
    x.fillText('本月精力曲線', W/2, 1085);
  }
  // 落款
  x.fillStyle = '#9C8B8E'; x.font = '27px '+TC;
  x.fillText('Moon Journal · 只屬於妳的週期日誌', W/2, H-125);
  // 輸出與分享（與備份同樣的三層保險）
  cv.toBlob(async (blob)=>{
    if(!blob){ toast('圖片生成失敗'); return; }
    const fname = '月記月報_'+y+'-'+String(m+1).padStart(2,'0')+'.png';
    const file = new File([blob], fname, {type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:'月記月報'}); return; }
      catch(e){ if(e && e.name==='AbortError') return; }
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    toast('月報卡已下載');
  }, 'image/png');
}

/* ═══════════════ 成就牆 ═══════════════ */
function progFor(a){
  const ms = state.maxStreak||0, st = sortedStarts().length;
  const en = Object.keys(state.entries).length, q = state.qianCount||0;
  const fix = {
    e_50:[en,50], e_100:[en,100], e_200:[en,200],
    e_qian30:[q,30], e_qian100:[q,100],
    e_export3:[state.exportCount||0,3],
  };
  if(a.id in fix) return fix[a.id];
  if(/^s\d+$/.test(a.id)) return [ms, Number(a.id.slice(1))];
  if(/^c\d+$/.test(a.id)) return [st, Number(a.id.slice(1))];
  if(a.id==='e_symall'){
    const seen={}; Object.values(state.entries).forEach(e=>(e.symptoms||[]).forEach(x=>seen[x]=1));
    return [Object.keys(seen).length, SYMPTOMS.length];
  }
  if(a.id==='e_moodall'){
    const seen={}; Object.values(state.entries).forEach(e=>{ if(e.mood) seen[e.mood]=1; });
    return [Object.keys(seen).length, MOODS.length];
  }
  if(a.id==='e_fullweek'){
    const ds = Object.keys(state.entries).filter(d=>state.entries[d].note).sort();
    let best = ds.length ? 1 : 0, run = 1;
    for(let i=1;i<ds.length;i++){
      run = (diffDays(ds[i-1], ds[i])===1) ? run+1 : 1;
      if(run>best) best = run;
    }
    return [Math.min(best,7), 7];
  }
  return null;
}
function shortDate(s){ return s.slice(0,4)+'.'+Number(s.slice(5,7))+'.'+Number(s.slice(8)); }
function renderWall(){
  const earned = Object.keys(state.achievements).length;
  const tiers = ['堅持','里程','探索','彩蛋'];
  let body = '';
  tiers.forEach(t=>{
    body += '<div class="wall-tier">'+t+'層</div><div class="wall-grid">';
    ACH.filter(a=>a.tier===t).forEach(a=>{
      const ok = !!state.achievements[a.id];
      if(a.hidden && !ok){ body += '<div class="ach hidden-egg"><span class="a-ico">❔</span>？？？</div>'; return; }
      let extra = '';
      if(ok){
        extra = `<span class="a-date">${shortDate(state.achievements[a.id])}</span>`;
      } else {
        const p = progFor(a);
        if(p){
          const cur = Math.min(p[0], p[1]);
          extra = `<span class="a-prog"><i style="width:${(cur/p[1])*100}%"></i></span><span class="a-num">${cur} / ${p[1]}</span>`;
        }
      }
      body += `<div class="ach ${ok?'earned':''}" title="${a.desc}"><span class="a-ico">${a.ico}</span>${a.name}${extra}</div>`;
    });
    body += '</div>';
  });
  const wc = document.getElementById('wallCard');
  wc.className = 'card exp' + (openState.wall ? ' open' : '');
  wc.dataset.k = 'wall';
  wc.innerHTML = `
    <div class="exp-head">
      <h3><span class="h-dot" style="background:var(--rose)"></span>成就牆</h3>
      <span class="exp-right"><span class="exp-status">已解鎖 ${earned} / ${ACH.length}</span><span class="chev-i">▾</span></span>
    </div>
    <div class="exp-body">${body}</div>`;
}

const THEMES = [['light','淺色'],['dark','深色'],['auto','自動']];
function applyTheme(){
  const t = state.settings.theme || 'light';
  const sysDark = window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches;
  const dark = t==='dark' || (t==='auto' && sysDark);
  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.content = dark ? '#251D21' : '#F4ECEA';
}
function renderThemeChips(){
  const box = document.getElementById('themeChips');
  box.innerHTML = THEMES.map(([k,name])=>
    `<button class="chip ${ (state.settings.theme||'light')===k?'on':'' }" data-th="${k}">${name}</button>`).join('');
  box.querySelectorAll('.chip').forEach(b=>b.addEventListener('click', ()=>{
    state.settings.theme = b.dataset.th;
    save(); applyTheme(); renderThemeChips();
  }));
}
if(window.matchMedia){
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>{
    if((state.settings.theme||'light')==='auto') applyTheme();
  });
}
document.querySelectorAll('[data-step]').forEach(b=>{
  b.addEventListener('click', ()=>{
    const [k, d] = b.dataset.step.split(':');
    const lim = k==='cycleLen' ? [21,45] : [2,10];
    state.settings[k] = Math.min(lim[1], Math.max(lim[0], state.settings[k]+Number(d)));
    save(); renderSettings(); renderToday();
  });
});
async function doExport(){
  state.lastBackupCount = recordCount();
  state.lastBackupDate = todayStr();
  state.exportCount = (state.exportCount||0) + 1;
  save();
  const json = JSON.stringify(state, null, 2);
  const fname = '月記備份_'+todayStr()+'.json';
  let done = false;
  // 第一層：系統分享面板（iOS 最穩，可存到「檔案」或傳 LINE）
  if(navigator.canShare){
    try{
      const file = new File([json], fname, {type:'application/json'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'月記備份'});
        done = true;
      }
    }catch(e){ if(e && e.name==='AbortError') done = true; }
  }
  // 第二層：傳統下載（Android Chrome）
  if(!done){
    try{
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([json], {type:'application/json'}));
      a.download = fname;
      document.body.appendChild(a); a.click(); a.remove();
      done = true;
    }catch(e){}
  }
  // 第三層：複製到剪貼簿
  if(!done && navigator.clipboard){
    try{ await navigator.clipboard.writeText(json); toast('已複製備份內容，請貼到記事本保存'); done = true; }catch(e){}
  }
  if(!checkAchievements()) toast('備份已匯出 🛡️');
  renderAll();
}
document.getElementById('btnExport').addEventListener('click', doExport);
document.getElementById('backupNow').addEventListener('click', doExport);
document.getElementById('btnImport').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (ev)=>{
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const s = JSON.parse(r.result);
      if(!Array.isArray(s.starts) || typeof s.entries !== 'object' || s.entries === null) throw 0;
      state = Object.assign(DEF(), s);
      state.settings = Object.assign(DEF().settings, s.settings||{});
      state.hasImported = true;
      save();
      if(!checkAchievements()) toast('已匯入備份');
      renderAll();
    }catch(e){ toast('檔案格式不對，匯入失敗'); }
  };
  r.readAsText(f);
  ev.target.value='';
});
document.getElementById('btnClear').addEventListener('click', ()=>{
  if(confirm('確定要清除全部資料嗎？此動作無法復原。\n建議先「匯出備份」。')){
    state = DEF();
    save(); renderAll(); toast('資料已清除');
  }
});

/* ═══════════════ 彈窗：經期開始 ═══════════════ */
let savedScrollY = 0;
function lockBody(){
  savedScrollY = window.scrollY || 0;
  document.body.style.position = 'fixed';
  document.body.style.top = (-savedScrollY)+'px';
  document.body.style.left = '0';
  document.body.style.right = '0';
}
function unlockBody(){
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.right = '';
  window.scrollTo(0, savedScrollY);
}
function openModal(id){
  document.getElementById(id).classList.add('open');
  lockBody();
}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
  if(!document.querySelector('.modal-mask.open')) unlockBody();
}
document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',()=>closeModal(b.dataset.close)));
document.querySelectorAll('.modal-mask').forEach(m=>m.addEventListener('click',(e)=>{
  if(e.target===m){
    m.classList.remove('open');
    if(!document.querySelector('.modal-mask.open')) unlockBody();
  }
}));

document.getElementById('btnPeriodStart').addEventListener('click', ()=>{
  document.getElementById('periodDate').value = todayStr();
  renderStartList();
  openModal('modalPeriod');
});
function renderStartList(){
  const box = document.getElementById('startList');
  const st = sortedStarts().slice(-6).reverse();
  box.innerHTML = st.length ? '<label style="font-size:12px;color:var(--ink-muted)">最近的紀錄</label>'+
    st.map(s=>`<div class="sl-row"><span>${niceDate(s)}（${weekday(s)}）</span>
      <button class="sl-del" data-del="${s}">刪除</button></div>`).join('') : '';
  box.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
    state.starts = state.starts.filter(x=>x!==b.dataset.del);
    save(); renderStartList(); renderAll();
  }));
}
document.getElementById('savePeriod').addEventListener('click', ()=>{
  const v = document.getElementById('periodDate').value;
  if(!v){ toast('請選擇日期'); return; }
  if(!state.starts.includes(v)) state.starts.push(v);
  save(); closeModal('modalPeriod');
  if(!checkAchievements()) toast('已紀錄經期開始 🌹');
  renderAll();
  window.scrollTo({top:0, behavior:'smooth'});
});

/* ═══════════════ 彈窗：今日紀錄 ═══════════════ */
let draft = {};
function chipGroup(elId, options, selected, multi){
  const box = document.getElementById(elId);
  box.innerHTML = options.map(o=>`<button class="chip ${multi ? (selected.includes(o)?'on':'') : (selected===o?'on':'')}" data-v="${o}">${o}</button>`).join('');
  box.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    const v=c.dataset.v;
    if(multi){
      const i=draft.symptoms.indexOf(v);
      i>=0 ? draft.symptoms.splice(i,1) : draft.symptoms.push(v);
      chipGroup(elId, options, draft.symptoms, true);
    }else{
      if(elId==='flowChips') draft.flow = (draft.flow===v?null:v);
      else draft.mood = (draft.mood===v?null:v);
      chipGroup(elId, options, elId==='flowChips'?draft.flow:draft.mood, false);
    }
  }));
}
function renderEnergy(){
  const box=document.getElementById('energyDots');
  box.innerHTML=[1,2,3,4,5].map(n=>`<button class="${draft.energy>=n?'on':''}" data-e="${n}" aria-label="精力 ${n}">${n}</button>`).join('');
  box.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    const n=Number(b.dataset.e);
    draft.energy = (draft.energy===n?0:n);
    renderEnergy();
  }));
}
document.getElementById('btnJournal').addEventListener('click', ()=>{
  const e = state.entries[todayStr()] || {};
  draft = { flow:e.flow||null, symptoms:[...(e.symptoms||[])], mood:e.mood||null, energy:e.energy||0, note:e.note||'' };
  document.getElementById('journalTitle').textContent = niceDate(todayStr())+' 的紀錄';
  chipGroup('flowChips', FLOWS, draft.flow, false);
  chipGroup('symptomChips', SYMPTOMS, draft.symptoms, true);
  chipGroup('moodChips', MOODS, draft.mood, false);
  renderEnergy();
  document.getElementById('noteInput').value = draft.note;
  openModal('modalJournal');
});
document.getElementById('saveJournal').addEventListener('click', ()=>{
  draft.note = document.getElementById('noteInput').value.trim();
  const empty = !draft.flow && !draft.symptoms.length && !draft.mood && !draft.energy && !draft.note;
  if(empty){ delete state.entries[todayStr()]; }
  else state.entries[todayStr()] = {flow:draft.flow, symptoms:draft.symptoms, mood:draft.mood, energy:draft.energy, note:draft.note};
  if(!empty){
    const hr = new Date().getHours();
    if(hr>=23) state.nightOwl = true;
    if(hr<6) state.dawnBird = true;
    const s = currentStreak();
    if(s > (state.maxStreak||0)) state.maxStreak = s;
  }
  save(); closeModal('modalJournal');
  if(!empty){
    if(!checkAchievements()) toast('已儲存今日紀錄 ✨');
  }
  renderAll();
});

/* ═══════════════ 分頁切換 ═══════════════ */
document.querySelectorAll('nav button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  b.classList.add('active');
  document.getElementById('view-'+b.dataset.view).classList.add('active');
  renderAll();
}));

/* ═══════════════ Toast 與啟動 ═══════════════ */
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'), 2200);
}
function renderAll(){ renderToday(); renderRecords(); renderInsights(); renderSettings(); }
applyTheme();
renderAll();
if(state.settings.pin) showLock('unlock');

/* ═══════════════ 私密鎖 ═══════════════ */
let lockMode = 'unlock', lockBuf = '', lockTemp = '';
function lockRender(){
  document.getElementById('lockDots').innerHTML =
    [0,1,2,3].map(i=>`<i class="${i<lockBuf.length?'f':''}"></i>`).join('');
}
function showLock(mode){
  lockMode = mode; lockBuf = ''; lockTemp = '';
  const titles = {unlock:'輸入密碼', set1:'設定四位數密碼', set2:'再輸入一次確認',
                  'verify-change':'輸入目前密碼', 'verify-off':'輸入密碼以關閉'};
  document.getElementById('lockTitle').textContent = titles[mode];
  document.getElementById('lockForgot').style.display = mode==='unlock' ? '' : 'none';
  const pad = document.getElementById('lockPad');
  if(!pad.children.length){
    pad.innerHTML = [1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>
      k===''?'<span></span>':`<button data-k="${k}">${k}</button>`).join('');
    pad.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>lockKey(b.dataset.k)));
  }
  lockRender();
  document.getElementById('lockScreen').style.display = 'flex';
}
function hideLock(){ document.getElementById('lockScreen').style.display = 'none'; }
function lockFail(){
  const el = document.getElementById('lockDots');
  el.classList.add('lock-shake');
  setTimeout(()=>el.classList.remove('lock-shake'), 400);
  lockBuf = ''; lockRender();
}
function lockKey(k){
  if(k==='⌫'){ lockBuf = lockBuf.slice(0,-1); lockRender(); return; }
  if(lockBuf.length>=4) return;
  lockBuf += k; lockRender();
  if(lockBuf.length<4) return;
  const pin = state.settings.pin;
  if(lockMode==='unlock'){
    lockBuf===pin ? hideLock() : lockFail();
  } else if(lockMode==='set1'){
    lockTemp = lockBuf; lockBuf = ''; lockMode = 'set2';
    document.getElementById('lockTitle').textContent = '再輸入一次確認';
    lockRender();
  } else if(lockMode==='set2'){
    if(lockBuf===lockTemp){
      state.settings.pin = lockBuf; save(); hideLock();
      toast('私密鎖已開啟 🔒'); renderSettings();
    } else {
      lockMode = 'set1'; lockTemp = '';
      document.getElementById('lockTitle').textContent = '兩次不一致，重新設定';
      lockFail();
    }
  } else if(lockMode==='verify-change'){
    lockBuf===pin ? showLock('set1') : lockFail();
  } else if(lockMode==='verify-off'){
    if(lockBuf===pin){
      state.settings.pin = null; save(); hideLock();
      toast('私密鎖已關閉'); renderSettings();
    } else lockFail();
  }
}
document.getElementById('lockForgot').addEventListener('click', ()=>{
  if(confirm('忘記密碼只能清除全部資料、重新開始（這是為了保護妳的隱私）。\n確定要清除嗎？')){
    state = DEF(); save(); hideLock(); applyTheme(); renderAll(); toast('資料已清除');
  }
});

/* 鎖定縮放：攔截 iOS 捏合手勢（雙擊放大由 CSS touch-action 處理） */
document.addEventListener('gesturestart', (e)=>e.preventDefault());

/* 永久儲存申請：跟系統說「這家店的東西別自動清」 */
if(navigator.storage && navigator.storage.persist){
  navigator.storage.persisted().then(already=>{
    if(already){ persistGranted = true; renderSettings(); }
    else navigator.storage.persist().then(g=>{ persistGranted = g; renderSettings(); });
  });
}

/* Service Worker 註冊（讓 App 可離線、可安裝） */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
